site_name: Ethertaco Docs
repo_url: https://github.com/Ethertaco/Ethertaco-Docs
repo_name: Ethertaco/Ethertaco-Docs
edit_uri: edit/main/docs/

hooks:
  - hooks.py
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: 浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips          # 让 *[术语]: 说明 渲染成悬停注脚

markdown_extensions:
  - admonition
  - footnotes                   # 可选：[^1] 式脚注
  - abbr                        # 悬停术语注脚（无需 snippets）
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          build: true
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true